<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Expensplit logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6C5CE7"/>
      <stop offset="55%" stop-color="#44C4FF"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square badge -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Split / divide chevron mark (two halves meeting) representing splitting an expense -->
  <g transform="translate(256 256)">
    <!-- Left half (white) -->
    <path d="M -118 -90 L -22 0 L -118 90 L -150 90 L -54 0 L -150 -90 Z"
          fill="#ffffff" opacity="0.96"/>
    <!-- Right half (mint highlight) -->
    <path d="M  118 -90 L  22 0 L  118 90 L  150 90 L  54 0 L 150 -90 Z"
          fill="#EAFFF7" opacity="0.95"/>
    <!-- Central divider — currency stroke -->
    <rect x="-7" y="-130" width="14" height="260" rx="7" fill="#ffffff"/>
    <!-- Small "S" curves to hint $ -->
    <path d="M -28 -86 Q 0 -110 28 -86" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M -28  86 Q 0  110 28  86" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
</svg>
